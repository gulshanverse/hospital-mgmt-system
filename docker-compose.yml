version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: hms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: hms_db
      MYSQL_USER: hms_user
      MYSQL_PASSWORD: hms_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - hms-network

  # Hospital Management System Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hms-app
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://hms_user:hms_password@mysql:3306/hms_db
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hms-network
    restart: unless-stopped

  # Optional: phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: hms-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: hms_user
      PMA_PASSWORD: hms_password
      PMA_ROOT_PASSWORD: root_password
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - hms-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  hms-network:
    driver: bridge
